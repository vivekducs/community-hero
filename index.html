<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Community Hero - Hyperlocal Problem Solver</title>
    <script>
      (function() {
        try {
          function addSetter(obj, prop) {
            if (!obj) return;
            var desc = Object.getOwnPropertyDescriptor(obj, prop);
            if (desc && desc.get && !desc.set && desc.configurable) {
              Object.defineProperty(obj, prop, {
                get: desc.get,
                set: function(v) { console.warn('Intercepted set ' + prop); },
                configurable: true,
                enumerable: desc.enumerable
              });
            }
          }
          if (typeof window !== 'undefined') {
            addSetter(window, 'fetch');
            if (window.Window && window.Window.prototype) {
              addSetter(window.Window.prototype, 'fetch');
            }
            if (typeof globalThis !== 'undefined') {
              addSetter(globalThis, 'fetch');
            }
          }
        } catch(e) {
          console.error('Fetch interceptor error:', e);
        }
      })();
    </script>
    <meta name="theme-color" content="#4f46e5" />
    <!-- Leaflet CSS for mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
